<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atthakit Portfolio | Full Stack Developer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans:    ['Outfit', 'Space Grotesk', 'sans-serif'],
              display: ['Space Grotesk', 'Outfit', 'sans-serif'],
            },
            colors: {
              navy: {
                900: '#040810',
                800: '#0a0f1e',
                700: '#111827',
                600: '#1a2235',
                500: '#1e2d47',
              },
              cyan: {
                DEFAULT: '#06b6d4',
                dim:     '#0891b2',
                glow:    'rgba(6,182,212,0.15)',
              },
              amber: {
                badge: '#f59e0b',
              }
            },
            animation: {
              blob:  'blob 7s infinite',
              blink: 'blink 1s step-end infinite',
              'fade-up':    'fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both',
              'slide-left': 'slideInLeft 0.6s cubic-bezier(0.16,1,0.3,1) both',
              'slide-right':'slideInRight 0.6s cubic-bezier(0.16,1,0.3,1) both',
            },
            keyframes: {
              blob: {
                '0%':   { transform: 'translate(0px, 0px) scale(1)' },
                '33%':  { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%':  { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%':      { opacity: '0' },
              },
              fadeUp: {
                from: { opacity: '0', transform: 'translateY(32px)' },
                to:   { opacity: '1', transform: 'translateY(0)' },
              },
              slideInLeft: {
                from: { opacity: '0', transform: 'translateX(-40px)' },
                to:   { opacity: '1', transform: 'translateX(0)' },
              },
              slideInRight: {
                from: { opacity: '0', transform: 'translateX(40px)' },
                to:   { opacity: '1', transform: 'translateX(0)' },
              },
            },
            boxShadow: {
              'cyan-glow': '0 0 0 1px rgba(6,182,212,0.3), 0 8px 32px rgba(6,182,212,0.15)',
              'amber-glow':'0 0 24px rgba(245,158,11,0.2)',
            },
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
